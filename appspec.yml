version: 0.0
// 다운로드 받은 파일을
// 작업디렉토리로 복사

os: linux
files:
  - source: /
    destination: /home/ubuntu
    overwrite: yes                // 덮어쓰기
file_exists_behavior: OVERWRITE   // 덮어쓰기

// 실행 디렉터리 권한 설정
permissions:
  - object: /home/ubuntu
    pattern: "**"
    owner: ubuntu
    group: ubuntu

hooks:
 ApplicationStop:
   - location: scripts/kill_process.sh
     timeout: 100
     runas: ubuntu
     
 ApplicationStart:
   - location: scripts/run_process.sh
     timeout: 300
     runas: ubuntu
